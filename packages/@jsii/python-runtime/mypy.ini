[mypy]
ignore_missing_imports = True

# Deferred (lazy) class factories and _LazyImport proxies produce types that
# mypy resolves as `object`. The following error codes are suppressed because
# they are expected consequences of the dynamic lazy loading pattern:
# - valid-type: using a lazy-loaded class as a type annotation
# - misc: dynamic base classes from factory functions
# - arg-type: passing lazy-resolved `object` where `type[Any]` expected
# - operator: calling constructors through lazy proxies
# - attr-defined: accessing attributes on lazy-resolved `object`
disable_error_code = valid-type, misc, arg-type, operator, attr-defined
