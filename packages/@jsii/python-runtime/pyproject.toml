[build-system]
requires = ["setuptools~=80.3", "wheel~=0.47"]
build-backend = 'setuptools.build_meta'

[tool.black]
target-version = ['py310', 'py311', 'py312', 'py313', 'py314']
include = '\.pyi?$'
exclude = '\.(git|mypy_cache|env)'

[tool.mypy]
ignore_missing_imports = true

[tool.pyright]
pythonVersion = "3.10"
venv = ".env"
venvPath = "."
# Deferred (lazy) classes loaded via __getattr__ are typed as 'object' by
# pyright, so attribute access and calls on them trigger false positives.
# These are expected limitations of the lazy class factory pattern.
reportAttributeAccessIssue = "warning"
reportCallIssue = "warning"
reportOperatorIssue = "warning"
reportFunctionMemberAccess = "warning"
