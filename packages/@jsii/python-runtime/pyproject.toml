[build-system]
requires = ["setuptools~=80.3", "wheel~=0.47"]
build-backend = 'setuptools.build_meta'

[tool.black]
target-version = ['py310', 'py311']
include = '\.pyi?$'
exclude = '\.(git|mypy_cache|env)'

[tool.mypy]
ignore_missing_imports = true

[tool.pyright]
pythonVersion = "3.10"
venv = ".env"
venvPath = "."
