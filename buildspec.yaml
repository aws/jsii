version: 0.2

phases:
  install:
    runtime-versions:
      ruby: 3.3
    commands:
      - corepack enable
      - yarn install --immutable
  build:
    commands:
      - yarn build && yarn test
      - yarn dist-clean

      - /bin/bash ./scripts/align-version.sh
      - yarn build
  post_build:
    commands:
      - '[ ${CODEBUILD_BUILD_SUCCEEDING} = 1 ] && yarn package'
artifacts:
  files:
    - "**/*"
  base-directory: dist
